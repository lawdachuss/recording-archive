<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc2222"/>
      <stop offset="100%" stop-color="#e82a2a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Top shine -->
  <rect width="180" height="90" rx="40" fill="url(#shine)"/>
  <!-- Vault arch + V letter icon -->
  <g transform="translate(90,90)">
    <!-- Vault arch (top) -->
    <path d="M-38,-32 Q0,-60 38,-32" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <!-- Vault arch (bottom) -->
    <path d="M-38,-32 L-38,22 Q-38,38 -22,38 L22,38 Q38,38 38,22 L38,-32" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
    <!-- V letter -->
    <path d="M-16,26 L-8,-14 Q0,-34 8,-14 L16,26" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="8" r="5" fill="#fff" opacity="0.6"/>
    <rect x="-2" y="8" width="4" height="8" rx="1" fill="#fff" opacity="0.6"/>
  </g>
</svg>
