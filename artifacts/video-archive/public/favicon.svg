<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark rounded square — visible on any browser tab background -->
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- Hexagonal vault outline (subtle) -->
  <path d="M32 10 L50 19.5 L50 44.5 L32 54 L14 44.5 L14 19.5 Z" 
        fill="none" 
        stroke="#dc2626" 
        stroke-width="2" 
        stroke-linejoin="round"
        opacity="0.35"/>
  <!-- Bold filled "V" letterform - clearly reads as V at any size -->
  <path d="M20 46 L32 22 L44 46 L38 46 L32 32 L26 46 Z" 
        fill="#dc2626"/>
</svg>
