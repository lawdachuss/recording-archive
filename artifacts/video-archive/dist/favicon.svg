<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="vault-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Vault / hexagon shape -->
  <path d="M32 4 L56 16 L56 48 L32 60 L8 48 L8 16 Z" 
        fill="none" 
        stroke="url(#vault-glow)" 
        stroke-width="3" 
        stroke-linejoin="round"/>
  <!-- Stylized "V" letterform -->
  <path d="M22 40 L32 20 L42 40" 
        fill="none" 
        stroke="url(#vault-glow)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  <!-- Accent dot - subtle glow node -->
  <circle cx="32" cy="14" r="2.5" fill="url(#vault-glow)" opacity="0.6"/>
</svg>
